<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vision Chef — Recipe Lens</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --cream:#F5F0E8;--charcoal:#1A1A1A;--card-bg:#231F18;
    --spice:#C8571B;--gold:#D4A847;--herb:#3D6B35;
    --muted:#7A7060;--surface:#2A2318;--border:rgba(255,255,255,0.08);
    --green:#3D6B35;--light-green:#82C979;
  }
  html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--charcoal);color:var(--cream);}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,26,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
  .logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--cream);text-decoration:none;}
  .logo em{color:var(--gold);font-style:italic;}
  .back-btn{display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;color:var(--muted);text-decoration:none;padding:0.4rem 1rem;border-radius:999px;border:1px solid var(--border);transition:color 0.2s;}
  .back-btn:hover{color:var(--cream);}

  .page{min-height:100vh;padding:7rem 2rem 4rem;max-width:1100px;margin:0 auto;}

  /* ── Stage 1: Upload ── */
  #stage-upload{display:flex;flex-direction:column;align-items:center;gap:2rem;padding:2rem 0;}

  .stage-label{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--light-green);}
  .stage-title{font-family:'Playfair Display',serif;font-size:2.4rem;text-align:center;line-height:1.2;}
  .stage-hint{font-size:0.9rem;color:var(--muted);text-align:center;max-width:440px;line-height:1.6;}

  /* Upload zone */
  .upload-zone{
    width:100%;max-width:560px;
    border:2px dashed rgba(130,201,121,0.3);border-radius:24px;
    background:rgba(61,107,53,0.06);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1rem;padding:3rem 2rem;cursor:pointer;
    transition:border-color 0.3s,background 0.3s;
    position:relative;
  }
  .upload-zone:hover,.upload-zone.dragover{border-color:var(--light-green);background:rgba(61,107,53,0.12);}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{font-size:3.5rem;}
  .upload-text{font-size:1rem;color:var(--cream);}
  .upload-subtext{font-size:0.8rem;color:var(--muted);}

  /* Camera section */
  .or-divider{display:flex;align-items:center;gap:1rem;width:100%;max-width:560px;}
  .or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .or-text{font-size:0.8rem;color:var(--muted);}

  .camera-section{width:100%;max-width:560px;display:flex;flex-direction:column;gap:1rem;align-items:center;}
  #videoContainer{position:relative;width:100%;border-radius:20px;overflow:hidden;display:none;background:#000;}
  #videoFeed{width:100%;display:block;border-radius:20px;}
  #captureOverlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .scan-line{
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--light-green),transparent);
    animation:scanDown 2s ease-in-out infinite;
  }
  @keyframes scanDown{0%{top:0;}50%{top:calc(100% - 3px);}100%{top:0;}}

  .camera-btn-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}

  .btn{
    padding:0.8rem 1.8rem;border-radius:999px;border:none;font-size:0.9rem;font-weight:500;cursor:pointer;
    transition:transform 0.2s,box-shadow 0.2s;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn-green{background:linear-gradient(135deg,var(--herb),#4A8A41);color:#fff;}
  .btn-green:hover{box-shadow:0 8px 24px rgba(61,107,53,0.4);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--cream);}
  .btn-spice{background:linear-gradient(135deg,var(--spice),#E06B2A);color:#fff;}
  .btn-spice:hover{box-shadow:0 8px 24px rgba(200,87,27,0.4);}

  /* Preview */
  #previewSection{display:none;width:100%;max-width:560px;}
  #previewSection.visible{display:block;}
  #previewImg{width:100%;border-radius:20px;margin-bottom:1.2rem;}

  .detect-row{display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;}

  /* Detection results */
  #detectionResults{display:none;width:100%;max-width:560px;}
  #detectionResults.visible{display:block;}

  .detection-header{font-size:0.82rem;color:var(--muted);margin-bottom:1rem;}

  .detection-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem;}
  .detection-item{
    display:flex;align-items:center;gap:1rem;
    padding:0.7rem 1rem;border-radius:12px;
    background:var(--surface);border:1px solid var(--border);
  }
  .det-veg{font-size:0.9rem;color:var(--cream);flex:1;}
  .det-confidence{font-size:0.78rem;color:var(--muted);width:60px;text-align:right;}
  .confidence-bar{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;}
  .confidence-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--herb),var(--light-green));transition:width 0.5s ease;}
  .det-check{color:var(--light-green);font-size:0.9rem;cursor:pointer;}
  .det-check.unchecked{color:var(--muted);}

  /* ── Stage 2: Results (same as voice) ── */
  #stage-results{display:none;}
  #stage-results.visible{display:block;}

  .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.8rem;flex-wrap:wrap;gap:1rem;}
  .results-title{font-family:'Playfair Display',serif;font-size:1.8rem;}
  .results-count{font-size:0.82rem;color:var(--muted);margin-top:0.2rem;}
  .retry-btn{padding:0.5rem 1.2rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--cream);font-size:0.82rem;cursor:pointer;}

  .filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;}
  .filter-pill{padding:0.4rem 1rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.2s;}
  .filter-pill.active{background:rgba(61,107,53,0.2);border-color:rgba(61,107,53,0.5);color:var(--light-green);}

  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;}
  .recipe-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:1.8rem;cursor:pointer;transition:transform 0.3s,border-color 0.3s,box-shadow 0.3s;animation:cardIn 0.4s ease both;position:relative;overflow:hidden;}
  .recipe-card:hover{transform:translateY(-6px);border-color:rgba(61,107,53,0.4);box-shadow:0 20px 50px rgba(0,0,0,0.4);}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;}
  .card-emoji{font-size:2rem;}
  .match-badge{font-size:0.7rem;padding:0.25rem 0.7rem;border-radius:999px;background:rgba(61,107,53,0.2);border:1px solid rgba(61,107,53,0.4);color:var(--light-green);}
  .card-name{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:0.4rem;}
  .card-desc{font-size:0.82rem;color:var(--muted);line-height:1.55;margin-bottom:1.2rem;}
  .card-meta{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;}
  .meta-item{font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:0.3rem;}
  .card-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.2rem;}
  .tag{padding:0.2rem 0.6rem;border-radius:6px;font-size:0.7rem;background:rgba(255,255,255,0.05);color:var(--muted);}
  .select-btn{width:100%;padding:0.75rem;border-radius:12px;border:none;background:rgba(61,107,53,0.2);color:var(--light-green);font-size:0.88rem;font-weight:500;cursor:pointer;transition:background 0.2s,color 0.2s;}
  .select-btn:hover{background:var(--herb);color:#fff;}

  .loading{text-align:center;padding:4rem;color:var(--muted);}
  .spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--light-green);animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .no-results{text-align:center;padding:4rem;}
  .no-results h3{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.8rem;}
  .no-results p{color:var(--muted);font-size:0.9rem;line-height:1.6;}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Recipe<em>Lens</em></a>
  <a href="/" class="back-btn">← Back</a>
</nav>

<div class="page">

  <!-- STAGE 1: Upload / Camera -->
  <div id="stage-upload">
    <p class="stage-label">📷 Vision Chef — Mode 02</p>
    <h1 class="stage-title">Show me what's in<br>your kitchen</h1>
    <p class="stage-hint">Upload a photo of your vegetables or capture one live. Our vision engine detects them automatically.</p>

    <!-- Upload zone -->
    <div class="upload-zone" id="uploadZone"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleDrop(event)">
      <input type="file" accept="image/*" id="fileInput" onchange="handleFileInput(event)"/>
      <div class="upload-icon">📁</div>
      <p class="upload-text">Drop image here or click to browse</p>
      <p class="upload-subtext">JPG, PNG, WEBP • Max 16MB</p>
    </div>

    <div class="or-divider"><span class="or-text">OR</span></div>

    <!-- Camera section -->
    <div class="camera-section">
      <div id="videoContainer">
        <video id="videoFeed" playsinline autoplay muted></video>
        <div id="captureOverlay">
          <div class="scan-line" id="scanLine" style="display:none"></div>
        </div>
      </div>
      <div class="camera-btn-row">
        <button class="btn btn-green" id="cameraBtn" onclick="startCamera()">📷 Open Camera</button>
        <button class="btn btn-outline" id="captureBtn" style="display:none" onclick="captureFrame()">📸 Capture</button>
        <button class="btn btn-outline" id="stopCamBtn" style="display:none" onclick="stopCamera()">✕ Close</button>
      </div>
    </div>

    <!-- Preview -->
    <div id="previewSection">
      <img id="previewImg" src="" alt="Preview"/>
      <div class="detect-row">
        <button class="btn btn-spice" onclick="analyzeImage()">🔍 Detect Vegetables</button>
        <button class="btn btn-outline" onclick="clearPreview()">✕ Clear</button>
      </div>
    </div>

    <!-- Detection results -->
    <div id="detectionResults">
      <p class="detection-header" id="detectionHeader">Detected vegetables:</p>
      <div class="detection-list" id="detectionList"></div>
      <div class="detect-row">
        <button class="btn btn-spice" onclick="findRecipesFromVision()">🍳 Find Recipes</button>
        <button class="btn btn-outline" onclick="clearPreview()">↩ Try Another Image</button>
      </div>
    </div>
  </div>

  <!-- STAGE 2: Results -->
  <div id="stage-results">
    <div class="results-header">
      <div>
        <h2 class="results-title">Suggested Recipes</h2>
        <p class="results-count" id="resultsCount"></p>
      </div>
      <button class="retry-btn" onclick="resetToUpload()">📷 Try Another Image</button>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-pill active" data-filter="" onclick="applyFilter(this)">All Recipes</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let capturedImageData = null;
let cameraStream = null;
let detectedItems = [];
let selectedVegs = new Set();
let activeFilter = '';

// ── File handling ─────────────────────────────────────────────────────────────
function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) loadImageFile(file);
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
}

function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    capturedImageData = e.target.result;
    showPreview(capturedImageData);
  };
  reader.readAsDataURL(file);
}

function showPreview(src) {
  document.getElementById('previewImg').src = src;
  document.getElementById('previewSection').classList.add('visible');
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('detectionResults').classList.remove('visible');
  document.getElementById('detectionResults').style.display = 'none';
}

function clearPreview() {
  capturedImageData = null;
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('detectionResults').style.display = 'none';
  document.getElementById('fileInput').value = '';
  stopCamera();
}

// ── Camera ────────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    const video = document.getElementById('videoFeed');
    video.srcObject = cameraStream;
    document.getElementById('videoContainer').style.display = 'block';
    document.getElementById('captureBtn').style.display = 'block';
    document.getElementById('stopCamBtn').style.display = 'block';
    document.getElementById('cameraBtn').style.display = 'none';
    document.getElementById('scanLine').style.display = 'block';
  } catch(e) {
    alert('Could not access camera: ' + e.message);
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  document.getElementById('videoContainer').style.display = 'none';
  document.getElementById('captureBtn').style.display = 'none';
  document.getElementById('stopCamBtn').style.display = 'none';
  document.getElementById('cameraBtn').style.display = 'block';
  document.getElementById('scanLine').style.display = 'none';
}

function captureFrame() {
  const video = document.getElementById('videoFeed');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  capturedImageData = canvas.toDataURL('image/jpeg', 0.92);
  showPreview(capturedImageData);
  stopCamera();
}

// ── Analyze image ─────────────────────────────────────────────────────────────
async function analyzeImage() {
  if (!capturedImageData) return;
  document.getElementById('detectionResults').style.display = 'block';
  document.getElementById('detectionResults').classList.add('visible');
  document.getElementById('detectionList').innerHTML = `<div class="loading"><div class="spinner"></div><p>Analyzing image...</p></div>`;

  try {
    const res = await fetch('/api/vision/detect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({image_data: capturedImageData})
    });
    const data = await res.json();
    detectedItems = data.detections || [];
    selectedVegs = new Set(data.vegetables || []);
    renderDetections(detectedItems);
  } catch(e) {
    document.getElementById('detectionList').innerHTML = `<p style="color:var(--muted)">Detection failed. Please try another image.</p>`;
  }
}

function renderDetections(items) {
  const list = document.getElementById('detectionList');
  const header = document.getElementById('detectionHeader');

  if (items.length === 0) {
    list.innerHTML = `<p style="color:var(--muted);font-size:0.88rem;">No vegetables detected. Try a clearer image with good lighting.</p>`;
    header.textContent = 'No vegetables found';
    return;
  }

  header.textContent = `${items.length} vegetable${items.length!==1?'s':''} detected — uncheck any that are wrong:`;
  list.innerHTML = '';

  items.forEach((item, i) => {
    const veg = item.vegetable;
    const conf = item.confidence || 0;
    const checked = selectedVegs.has(veg);

    const el = document.createElement('div');
    el.className = 'detection-item';
    el.innerHTML = `
      <span style="font-size:1.2rem">${getVegEmoji(veg)}</span>
      <span class="det-veg">${capitalize(veg)}</span>
      <div class="confidence-bar">
        <div class="confidence-fill" id="conf-${i}" style="width:0%"></div>
      </div>
      <span class="det-confidence">${Math.round(conf)}%</span>
      <span class="det-check ${checked?'':'unchecked'}" id="check-${i}" onclick="toggleVeg('${veg}',${i})" title="Toggle selection">
        ${checked ? '✓' : '○'}
      </span>
    `;
    list.appendChild(el);

    setTimeout(() => {
      const bar = document.getElementById(`conf-${i}`);
      if(bar) bar.style.width = Math.min(conf, 100) + '%';
    }, 100 + i*60);
  });
}

function toggleVeg(veg, index) {
  const check = document.getElementById(`check-${index}`);
  if (selectedVegs.has(veg)) {
    selectedVegs.delete(veg);
    check.textContent = '○';
    check.className = 'det-check unchecked';
  } else {
    selectedVegs.add(veg);
    check.textContent = '✓';
    check.className = 'det-check';
  }
}

function getVegEmoji(veg) {
  const map = {
    tomato:'🍅',carrot:'🥕',broccoli:'🥦',spinach:'🥬',onion:'🧅',
    garlic:'🧄',potato:'🥔',pepper:'🫑','bell pepper':'🫑',
    eggplant:'🍆',cucumber:'🥒',corn:'🌽',peas:'🫛',
    mushroom:'🍄',cabbage:'🥬',cauliflower:'🥦',
    ginger:'🫚',chili:'🌶️',beans:'🫘',pumpkin:'🎃',
  };
  return map[veg] || '🥦';
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Find recipes ──────────────────────────────────────────────────────────────
async function findRecipesFromVision() {
  const vegs = [...selectedVegs];
  if (vegs.length === 0) {
    alert('Please select at least one vegetable.');
    return;
  }
  showResultsStage(vegs);
}

async function showResultsStage(vegs) {
  document.getElementById('stage-upload').style.display = 'none';
  document.getElementById('stage-results').style.display = 'block';
  document.getElementById('stage-results').classList.add('visible');
  await loadFilters();
  await loadRecipes(vegs, '');
}

async function loadRecipes(vegs, filter) {
  document.getElementById('cardsGrid').innerHTML = `<div class="loading"><div class="spinner"></div><p>Finding perfect recipes...</p></div>`;
  try {
    const res = await fetch('/api/suggest', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({vegetables: vegs, filter: filter || null})
    });
    const data = await res.json();
    const cards = data.cards || [];
    renderCards(cards, vegs);
  } catch(e) {
    document.getElementById('cardsGrid').innerHTML = `<div class="no-results"><h3>Something went wrong</h3><p>Please try again.</p></div>`;
  }
}

async function loadFilters() {
  try {
    const res = await fetch('/api/filters');
    const filters = await res.json();
    const bar = document.getElementById('filterBar');
    bar.innerHTML = `<button class="filter-pill active" data-filter="" onclick="applyFilter(this)">All Recipes</button>`;
    Object.entries(filters).forEach(([key, cfg]) => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.dataset.filter = key;
      btn.textContent = `${cfg.icon} ${cfg.label}`;
      btn.onclick = () => applyFilter(btn);
      bar.appendChild(btn);
    });
  } catch(e) {}
}

function applyFilter(btn) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  loadRecipes([...selectedVegs], activeFilter);
}

const EMOJIS = {'Aloo Gobi':'🥔','Palak Paneer':'🥬','Mixed Vegetable Stir Fry':'🥦',default:'🍲'};

function renderCards(cards, vegs) {
  const grid = document.getElementById('cardsGrid');
  document.getElementById('resultsCount').textContent =
    `${cards.length} recipe${cards.length!==1?'s':''} found for: ${[...selectedVegs].join(', ')}`;

  if (cards.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><h3>No recipes found</h3><p>Try changing the filter.</p></div>`;
    return;
  }
  grid.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'recipe-card';
    el.style.animationDelay = (i * 0.07) + 's';
    const emoji = EMOJIS[card.name] || EMOJIS.default;
    const diff = {Easy:'🟢',Medium:'🟡',Hard:'🔴'};
    el.innerHTML = `
      <div class="card-header">
        <div class="card-emoji">${emoji}</div>
        <div class="match-badge">${card.coverage_pct}% match</div>
      </div>
      <h3 class="card-name">${card.name}</h3>
      <p class="card-desc">${card.description}</p>
      <div class="card-meta">
        <span class="meta-item">⏱️ ${card.total_time} min</span>
        <span class="meta-item">${diff[card.difficulty]||'🟡'} ${card.difficulty}</span>
        <span class="meta-item">🔥 ${card.calories} kcal</span>
      </div>
      <div class="card-tags">${card.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <button class="select-btn" onclick="window.location.href='/recipe/${card.id}'">View Recipe & Start Cooking →</button>
    `;
    grid.appendChild(el);
  });
}

function resetToUpload() {
  document.getElementById('stage-upload').style.display = 'flex';
  document.getElementById('stage-results').style.display = 'none';
  clearPreview();
}
</script>
</body>
</html>
